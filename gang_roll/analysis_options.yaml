# Configures the Dart analyzer. Shows in your IDE and via `flutter analyze`.

include: package:flutter_lints/flutter.yaml

# Riverpod-specific lints (e.g. provider_dependencies, unused_provider) run
# through custom_lint. View them with `dart run custom_lint`.
analyzer:
  plugins:
    - custom_lint

linter:
  rules:
    # Project preferences — adjust as we go.
    prefer_single_quotes: true
    require_trailing_commas: true
